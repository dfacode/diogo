text1= + 15 anos de experiência como Consultor Desenvolvedor SAP HCM, trabalhando em projetos no Brasil, sempre contribuindo para melhorar os sistemas de RH de várias empresas em diferentes segmentos.
text2= • Experiência em analisar requisitos de negócios e determinar a solução técnica, desenvolvendo estimativas de projetos, planos de trabalho e executando-os.
text3= • Experiência na elaboração de especificações técnicas e scripts de teste a partir de requisitos de negócios.
text4= • Experiência na elaboração de novos relatórios e na modificação de relatórios existentes, listas ALV, programação de diálogos e aprimoramentos (user-exits, field-exits e Business Add-lns).
text5= • Experiência no uso de ABAP Objects, ABAP WebDynpro, ABAP Dictionary, ABAP Query, SAP Scripts, Smart Forms, Adobe Forms e HRForms.
text6= • Experiência com ajuste de desempenho, migração de dados, definição e codificação de regras de conversão e interfaces usando LSMW, ALE, IDOC, BAPI, RFC, BDC (Batch Input) e métodos de atualização de transações de chamada.
text7= • Experiência na implementação, consumo de serviços web (SOAP/REST) e teste dos mesmos utilizando SOAPUI, Postman.
text8= • Experiência em desenvolvimento SAPUI5/Fiori, oData/Gateway e SAP BTP.
text9= • Experiência na criação de integrações SAP com sistemas externos.

text10= • Pós-graduação: Universidade Metodista de São Paulo, Gestão de Projetos, conclusão em julho de 2017.
text11= • Graduação: Centro Universitário Fundação Santo André (FSA), bacharelado em Sistemas de Informação, conclusão em dezembro de 2009.

